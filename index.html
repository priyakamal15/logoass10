<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#8B0000,#c62828);
}

.container{
    width:400px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    text-align:center;
}

.container img{
    width:130px;
    margin-bottom:15px;
}

h2{
    color:#8B0000;
    margin-bottom:8px;
    font-size:24px;
}

p{
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

input:focus{
    border-color:#8B0000;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    background:#8B0000;
    color:white;
    font-size:17px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#a50000;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#777;
}
</style>

</head>

<body>

<div class="container">

    <!-- Upload your college logo with this filename -->
    <img src="LOGO-removebg-preview.png" alt="Adhiparasakthi Engineering College Logo">

    <h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>

    <p>Student Login Portal</p>

    <form>

        <input
        type="text"
        placeholder="Username"
        required>

        <input
        type="password"
        placeholder="Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        © Adhiparasakthi Engineering College
    </div>

</div>

</body>
</html>
